name: Android Build

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APK_SOURCE_PATH: android/app/build/outputs/apk/debug/app-debug.apk

    steps:
      - name: Checkout mobile wrapper
        uses: actions/checkout@v4

      # The web client lives in a separate repo. It is public, so the default
      # GITHUB_TOKEN can read it; set a WEB_REPO_TOKEN secret (PAT) if you make
      # it private.
      - name: Checkout web client (client-poke.io)
        uses: actions/checkout@v4
        with:
          repository: klys/client-poke.io
          ref: master
          path: web-src
          token: ${{ secrets.WEB_REPO_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install mobile dependencies
        run: npm ci

      # Builds client-poke.io and copies the bundle into ./www. Provide either
      # MOBILE_CONFIG_JSON or BACKEND_URL + ASSET_STORAGE_BASE_URL so the APK
      # can reach the server and native asset proxy upstream.
      - name: Build web client into www/
        env:
          WEB_SRC: ${{ github.workspace }}/web-src
          CONFIG_JSON: ${{ secrets.MOBILE_CONFIG_JSON }}
          BACKEND_URL: ${{ secrets.MOBILE_BACKEND_URL || vars.MOBILE_BACKEND_URL || secrets.BACKEND_URL || vars.BACKEND_URL || 'https://venova-alpha-backend.adventurex.games' }}
          ASSET_STORAGE_BASE_URL: ${{ secrets.MOBILE_ASSET_STORAGE_BASE_URL || vars.MOBILE_ASSET_STORAGE_BASE_URL || secrets.ASSET_STORAGE_BASE_URL || vars.ASSET_STORAGE_BASE_URL || 'https://venova-2022-assets.adventurex.games' }}
        run: npm run build:web

      - name: Capacitor sync
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Package APK
        id: package
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          APK_NAME="pokecraft-debug-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}-${SHORT_SHA}.apk"
          APK_PATH="build/release/${APK_NAME}"

          mkdir -p build/release
          cp "$APK_SOURCE_PATH" "$APK_PATH"

          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pokecraft-debug-apk
          path: ${{ steps.package.outputs.apk_path }}
          if-no-files-found: error

      - name: Prepare release metadata
        id: release
        if: github.event_name != 'pull_request'
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="android-v${VERSION}-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          TITLE="PokeCraft Android v${VERSION} (${SHORT_SHA})"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.release.outputs.tag }}" "${{ steps.package.outputs.apk_path }}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.release.outputs.title }}" \
            --notes "Debug APK built from commit ${GITHUB_SHA}." \
            --prerelease
